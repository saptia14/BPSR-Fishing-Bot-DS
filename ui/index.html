<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>BPSR Fishing Bot</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app-container">

    <!-- BARRA DE CONTROLO -->
    <div class="control-bar glass">
        <div class="drag-handle" title="Arrastar">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="#666"><path d="M11 18c0 1.1-.9 2-2 2s-2-.9-2-2 .9-2 2-2 2 .9 2 2zm-2-8c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0-6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm6 4c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
        </div>

        <div class="status-dot stopped" id="statusDot"></div>

        <div class="actions">
            <button id="btnStart" class="btn-icon play" title="Iniciar">
                <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            </button>
            <button id="btnPause" class="btn-icon pause hidden" title="Pausar">
                <svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
            <button id="btnStop" class="btn-icon stop hidden" title="Parar">
                <svg viewBox="0 0 24 24"><path d="M6 6h12v12H6z"/></svg>
            </button>
        </div>

        <div class="divider"></div>

        <div class="secondary-actions">
            <button id="btnStats" class="btn-text" title="Expandir Stats">
                <span id="miniStats">0 🐟</span>
            </button>
            <button id="btnSettings" class="btn-icon small" title="Configurações">
                <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.488.488 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.58 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
            </button>
            <button id="btnOpenLogs" class="btn-icon small" title="Logs">
                <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
            </button>
        </div>
    </div>

    <!-- PAINEL DE ESTATÍSTICAS -->
    <div id="statsPanel" class="stats-panel glass hidden">
        <div class="stat-item">
            <span class="label">Peixes</span>
            <span class="value highlight" id="statFish">0</span>
        </div>
        <div class="stat-item">
            <span class="label">Fugas</span>
            <span class="value warning" id="statEscaped">0</span>
        </div>
        <div class="stat-item">
            <span class="label">Canas</span>
            <span class="value danger" id="statRods">0</span>
        </div>
    </div>
</div>
<script src="renderer.js"></script>
</body>
</html>
